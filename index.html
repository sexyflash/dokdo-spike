<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>독도 · 바위섬</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Pretendard',sans-serif}
  #app{position:fixed;inset:0}
  canvas{display:block}
  .hero{position:fixed;top:6%;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:none;width:94%}
  .hero .en{font-weight:800;font-size:clamp(22px,4.6vw,52px);letter-spacing:.5px;color:#fff;
    text-shadow:0 2px 16px rgba(20,50,70,.45),0 0 26px rgba(255,235,170,.28)}
  .hero .ko{margin-top:6px;font-weight:600;font-size:clamp(13px,2vw,22px);color:rgba(255,255,255,.94);text-shadow:0 2px 10px rgba(20,50,70,.5)}
  .fps{position:fixed;left:12px;bottom:12px;z-index:10;font-size:11px;color:#0c2630;opacity:.5}
  .loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
    background:#bfe6f2;z-index:50;color:#0c2630;font-weight:600;transition:opacity .6s}
  .spin{width:34px;height:34px;border:3px solid rgba(12,38,48,.18);border-top-color:#0c2630;border-radius:50%;animation:s .9s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<div class="hero"><div class="en">DOKDO IS KOREAN TERRITORY</div><div class="ko">독도는 대한민국 영토입니다</div></div>
<div class="fps" id="fps"></div>
<div class="loader" id="loader"><div class="spin"></div><div>독도를 빚는 중…</div></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { mergeVertices, mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

let renderer, scene, camera, controls, seaLevel = 0;
const clouds = [];
const clock = new THREE.Clock();

init();

function init() {
  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.0;
  renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('app').appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xbfe6f2);
  scene.fog = new THREE.Fog(0xbfe6f2, 130, 480);
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

  camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 2000);
  camera.position.set(0, 40, 60);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  controls.minDistance = 16; controls.maxDistance = 170; controls.maxPolarAngle = Math.PI/2.15;

  const key = new THREE.DirectionalLight(0xfff1d6, 1.7); key.position.set(48, 78, 34); key.castShadow = true;
  key.shadow.mapSize.set(2048,2048);
  const sc=key.shadow.camera; sc.near=1; sc.far=280; sc.left=-55; sc.right=55; sc.top=55; sc.bottom=-55;
  key.shadow.bias=-0.0006; key.shadow.normalBias=0.6; scene.add(key);
  scene.add(new THREE.HemisphereLight(0xdcf0ff, 0x6a7560, 0.5));
  scene.add(new THREE.AmbientLight(0xffffff, 0.18));

  addEventListener('resize', onResize);
  build();
}
function onResize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); }

async function build() {
  const stl = await new STLLoader().loadAsync('Dokdo_Korea.stl');
  stl.rotateX(-Math.PI/2); stl.center();
  stl.computeBoundingBox(); const sz=new THREE.Vector3(); stl.boundingBox.getSize(sz);
  const s = 60/Math.max(sz.x,sz.y,sz.z); stl.scale(s,s,s);
  let g; try{ g = mergeVertices(stl, 1e-3); }catch(e){ g = stl; }
  g.computeBoundingBox();
  const gMinY=g.boundingBox.min.y, gMaxY=g.boundingBox.max.y;
  // Dokdo rises steeply — keep waterline low so the rock cliffs show
  const seaY = gMinY + (gMaxY-gMinY)*0.10; const lift = -gMinY*0.5;
  seaLevel = lift + seaY;
  g.translate(0, lift, 0); g.computeVertexNormals();
  colorDokdo(g, seaLevel);
  const island = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ vertexColors:true, flatShading:true, roughness:0.96, metalness:0, envMapIntensity:0.35 }));
  island.castShadow = true; island.receiveShadow = true; scene.add(island);

  addWater();
  addRocks();
  addClouds();

  const ld=document.getElementById('loader'); ld.style.opacity='0'; setTimeout(()=>ld.remove(),600);
  animate();
}

// Dokdo's character: dark volcanic rock + steep cliffs, sparse green moss only on the gentle upper slopes
function colorDokdo(geo, sea) {
  geo.computeVertexNormals();
  const pos=geo.attributes.position, nor=geo.attributes.normal;
  let minY=1e9, maxY=-1e9;
  for(let i=0;i<pos.count;i++){ const y=pos.getY(i); if(y<minY)minY=y; if(y>maxY)maxY=y; }
  const cliff=new THREE.Color(0x5f574d), rockMid=new THREE.Color(0x847a6e), rockHi=new THREE.Color(0xa79c8c),
        moss=new THREE.Color(0x6f8a46), shore=new THREE.Color(0xc2b69c), sub=new THREE.Color(0x3a3f3a);
  const cols=new Float32Array(pos.count*3); const c=new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const y=pos.getY(i), ny=Math.max(0, nor.getY(i));               // ny: 1 flat-top, 0 vertical cliff
    if (y < sea) { const d=Math.min(1,(sea-y)/((sea-minY)||1)*1.2); c.copy(shore).lerp(sub, d); }
    else {
      const t=(y-sea)/((maxY-sea)||1);                              // 0 shoreline .. 1 peak
      c.copy(rockMid).lerp(rockHi, t*0.55);                         // higher = lighter rock
      c.lerp(cliff, (1-ny)*0.55);                                   // steep faces darker
      const green = Math.pow(ny, 2.2) * THREE.MathUtils.smoothstep(t, 0.15, 0.55);
      c.lerp(moss, green*0.75);                                     // moss only where gentle + a bit up
      if (t < 0.07) c.lerp(shore, (0.07-t)/0.07*0.55);              // light shoreline rock
    }
    cols[i*3]=c.r; cols[i*3+1]=c.g; cols[i*3+2]=c.b;
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(cols,3));
}

function addWater() {
  const w = new THREE.Mesh(new THREE.PlaneGeometry(1500,1500).rotateX(-Math.PI/2),
    new THREE.MeshStandardMaterial({ color:0x2c8fb0, roughness:0.45, metalness:0, transparent:true, opacity:0.92, envMapIntensity:0.5 }));
  w.position.y = seaLevel; scene.add(w);
  // gentle lighter shoreline ring
  const ring = new THREE.Mesh(new THREE.RingGeometry(0, 1, 1), null); // placeholder (kept simple)
  ring.visible = false;
}

// small surrounding rocks/islets (Dokdo is a rocky archipelago)
function addRocks() {
  for(let i=0;i<12;i++){
    const r = 0.9 + Math.random()*2.4;
    const geo = new THREE.IcosahedronGeometry(r, 0);
    const p = geo.attributes.position;                              // jitter for chunky rock
    for(let k=0;k<p.count;k++){ p.setXYZ(k, p.getX(k)*(0.8+Math.random()*0.4), p.getY(k)*(0.55+Math.random()*0.4), p.getZ(k)*(0.8+Math.random()*0.4)); }
    geo.computeVertexNormals();
    const shade = 0.42 + Math.random()*0.22;
    const mat = new THREE.MeshStandardMaterial({ color:new THREE.Color().setHSL(0.09, 0.12, shade), flatShading:true, roughness:1, metalness:0 });
    const m = new THREE.Mesh(geo, mat);
    const a = Math.random()*6.28, dist = 20 + Math.random()*30;
    m.position.set(Math.cos(a)*dist, seaLevel - r*0.25, Math.sin(a)*dist);
    m.rotation.y = Math.random()*6.28; m.castShadow = true; m.receiveShadow = true;
    scene.add(m);
  }
}

function makeCloudGeo(){
  const parts=[]; const n=3+Math.floor(Math.random()*3);
  for(let i=0;i<n;i++){ const r=2+Math.random()*2.4; const gg=new THREE.IcosahedronGeometry(r,0);
    gg.translate((Math.random()-0.5)*6,(Math.random()-0.5)*1.4,(Math.random()-0.5)*3.2); parts.push(gg); }
  const m=mergeGeometries(parts,false); m.computeVertexNormals(); return m;
}
function addClouds(){
  const mat=new THREE.MeshStandardMaterial({ color:0xffffff, flatShading:true, roughness:1, metalness:0, fog:false });
  for(let i=0;i<6;i++){ const c=new THREE.Mesh(makeCloudGeo(),mat); const s=0.8+Math.random()*0.6; c.scale.set(s,s*0.7,s);
    c.position.set((Math.random()-0.5)*230, 40+Math.random()*22, (Math.random()-0.5)*170); c.userData.spd=0.4+Math.random()*0.6;
    scene.add(c); clouds.push(c); }
}

let frames=0,last=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  for(const c of clouds){ c.position.x+=c.userData.spd*dt; if(c.position.x>150)c.position.x=-150; }
  controls.update();
  renderer.render(scene,camera);
  frames++; const now=performance.now(); if(now-last>500){ document.getElementById('fps').textContent=Math.round(frames*1000/(now-last))+' fps'; frames=0; last=now; }
}
</script>
</body>
</html>
