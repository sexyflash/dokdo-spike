<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>독도 · Low Poly Island 룩</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Pretendard',sans-serif}
  #app{position:fixed;inset:0}
  canvas{display:block}
  .hero{position:fixed;top:6%;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:none;width:94%}
  .hero .en{font-weight:800;font-size:clamp(22px,4.6vw,52px);letter-spacing:.5px;color:#fff;
    text-shadow:0 2px 16px rgba(20,60,80,.4),0 0 28px rgba(255,230,150,.3)}
  .hero .ko{margin-top:6px;font-weight:600;font-size:clamp(13px,2vw,22px);color:rgba(255,255,255,.94);text-shadow:0 2px 10px rgba(20,60,80,.45)}
  .cred{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;color:#10303a;opacity:.62;font-size:11px;font-weight:600;text-align:center}
  .fps{position:fixed;left:12px;bottom:12px;z-index:10;font-size:11px;color:#10303a;opacity:.5}
  .loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
    background:#bfe6f2;z-index:50;color:#10303a;font-weight:600;transition:opacity .6s}
  .spin{width:34px;height:34px;border:3px solid rgba(16,48,58,.18);border-top-color:#10303a;border-radius:50%;animation:s .9s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<div class="hero"><div class="en">DOKDO IS KOREAN TERRITORY</div><div class="ko">독도는 대한민국 영토입니다</div></div>
<div class="cred">terrain: Dokdo · art: "Low Poly Island" by EdwiixGG (@Edwin3D), CC BY 4.0 — modified</div>
<div class="fps" id="fps"></div>
<div class="loader" id="loader"><div class="spin"></div><div>독도에 섬을 심는 중…</div></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { ColladaLoader } from 'three/addons/loaders/ColladaLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { mergeVertices, mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

let renderer, scene, camera, controls, island, seaLevel = 0;
const clouds = [];
const clock = new THREE.Clock();
const WATER = 0x21ccbb;

init();

function init() {
  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.0;
  renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('app').appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xbfe6f2);
  scene.fog = new THREE.Fog(0xbfe6f2, 120, 460);
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

  camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 2000);
  camera.position.set(0, 46, 66);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  controls.minDistance = 14; controls.maxDistance = 170; controls.maxPolarAngle = Math.PI/2.15;

  const dir = new THREE.DirectionalLight(0xfff2dc, 1.7); dir.position.set(45,85,35); dir.castShadow=true;
  dir.shadow.mapSize.set(2048,2048);
  const sc=dir.shadow.camera; sc.near=1; sc.far=280; sc.left=-55; sc.right=55; sc.top=55; sc.bottom=-55;
  dir.shadow.bias=-0.0006; dir.shadow.normalBias=0.5; scene.add(dir);
  scene.add(new THREE.HemisphereLight(0xdff2ff, 0x88a596, 0.55));
  scene.add(new THREE.AmbientLight(0xffffff, 0.22));

  addEventListener('resize', onResize);
  buildScene();
}

function onResize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); }

async function buildScene() {
  // 1) Dokdo terrain (our shape, asset-style palette)
  const stl = await new STLLoader().loadAsync('Dokdo_Korea.stl');
  stl.rotateX(-Math.PI/2); stl.center();
  stl.computeBoundingBox(); const sz=new THREE.Vector3(); stl.boundingBox.getSize(sz);
  const s = 60/Math.max(sz.x,sz.y,sz.z); stl.scale(s,s,s);
  let merged; try{ merged = mergeVertices(stl, 1e-3); }catch(e){ merged = stl; }
  merged.computeBoundingBox();
  const gMinY=merged.boundingBox.min.y, gMaxY=merged.boundingBox.max.y;
  const seaY = gMinY + (gMaxY-gMinY)*0.16; const lift = -gMinY*0.5;
  seaLevel = lift + seaY;
  merged.translate(0, lift, 0); merged.computeVertexNormals();
  colorTerrain(merged, seaLevel);
  island = new THREE.Mesh(merged, new THREE.MeshStandardMaterial({ vertexColors:true, flatShading:true, roughness:0.95, metalness:0, envMapIntensity:0.3 }));
  island.castShadow = true; island.receiveShadow = true; scene.add(island);

  // water + seabed (asset look)
  addWaterAndBed();
  addClouds();

  // 2) extract props from the asset and scatter on Dokdo
  try {
    const collada = await new ColladaLoader().loadAsync('asset/island.dae');
    const props = extractProps(collada.scene);
    scatterProps(props);
  } catch(e){ console.error('asset load/extract failed', e); }

  const ld=document.getElementById('loader'); ld.style.opacity='0'; setTimeout(()=>ld.remove(),600);
  animate();
}

function colorTerrain(geo, sea) {
  const pos=geo.attributes.position; let minY=1e9,maxY=-1e9;
  for(let i=0;i<pos.count;i++){const y=pos.getY(i); if(y<minY)minY=y; if(y>maxY)maxY=y;}
  const sand=new THREE.Color(0xe9d9a2), grass=new THREE.Color(0xa6c63c), grass2=new THREE.Color(0x82a82e), deep=new THREE.Color(0x9a8f5a);
  const cols=new Float32Array(pos.count*3); const c=new THREE.Color();
  for(let i=0;i<pos.count;i++){ const y=pos.getY(i);
    if(y<sea){ const d=(sea-y)/((sea-minY)||1); c.copy(sand).lerp(deep, Math.min(1,d)); }
    else { const t=(y-sea)/((maxY-sea)||1); c.copy(t<0.12?sand:grass).lerp(grass2, Math.max(0,(t-0.12)/0.88)); }
    cols[i*3]=c.r; cols[i*3+1]=c.g; cols[i*3+2]=c.b;
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(cols,3));
}

function addWaterAndBed() {
  const bed = new THREE.Mesh(new THREE.PlaneGeometry(1300,1300,1,1).rotateX(-Math.PI/2),
    new THREE.MeshStandardMaterial({ color:0x2f8f86, roughness:1, metalness:0 }));
  bed.position.y = seaLevel - 7; bed.receiveShadow = true; scene.add(bed);
  const water = new THREE.Mesh(new THREE.PlaneGeometry(1300,1300,1,1).rotateX(-Math.PI/2),
    new THREE.MeshStandardMaterial({ color:WATER, roughness:0.35, metalness:0, transparent:true, opacity:0.78, envMapIntensity:0.5 }));
  water.position.y = seaLevel; water.renderOrder = 1; scene.add(water);
}

function makeCloudGeo(){
  const parts=[]; const n=3+Math.floor(Math.random()*3);
  for(let i=0;i<n;i++){ const r=2+Math.random()*2.4; const g=new THREE.IcosahedronGeometry(r,0);
    g.translate((Math.random()-0.5)*6,(Math.random()-0.5)*1.4,(Math.random()-0.5)*3.2); parts.push(g); }
  const m=mergeGeometries(parts,false); m.computeVertexNormals(); return m;
}
function addClouds(){
  const mat=new THREE.MeshStandardMaterial({ color:0xffffff, flatShading:true, roughness:1, metalness:0, fog:false });
  for(let i=0;i<6;i++){ const c=new THREE.Mesh(makeCloudGeo(),mat); const s=0.8+Math.random()*0.6; c.scale.set(s,s*0.7,s);
    c.position.set((Math.random()-0.5)*230, 36+Math.random()*22, (Math.random()-0.5)*170); c.userData.spd=0.4+Math.random()*0.6;
    scene.add(c); clouds.push(c); }
}

// ── extract reusable props (palms/rocks/grass) from the asset by clustering nearby meshes ──
// colours are in LINEAR space here (three colorManagement)
const isFoliage = c => c.g>=c.r && c.g>c.b && c.g>0.35 && c.b<0.25;   // green leaves/grass
const isGrey    = c => Math.abs(c.r-c.g)<0.1 && Math.abs(c.g-c.b)<0.1;
function extractProps(model) {
  const meshes = [];
  model.updateMatrixWorld(true);
  model.traverse(o => {
    if (!o.isMesh) return;
    o.geometry.computeBoundingBox();
    o.updateWorldMatrix(true,false);
    const wb=o.geometry.boundingBox.clone().applyMatrix4(o.matrixWorld);
    const s=new THREE.Vector3(); wb.getSize(s);
    const maxDim=Math.max(s.x,s.y,s.z);                 // WORLD size (node scale matters!)
    if (maxDim > 10) return;            // skip big stuff: water tile, plane wreck, giant boulders
    const mat=Array.isArray(o.material)?o.material[0]:o.material;
    if (!mat?.color) return;
    const c=mat.color;
    if (c.b>=c.r && c.b>=c.g && c.b>0.42) return;   // exclude all blue: water + fish
    const center=o.geometry.boundingBox.getCenter(new THREE.Vector3()).applyMatrix4(o.matrixWorld);
    meshes.push({ o, center, col: c });
  });
  // cluster by XZ proximity (tight, so palms don't chain into giant blobs)
  const used=new Array(meshes.length).fill(false); const R=2.6; const clusters=[];
  for(let i=0;i<meshes.length;i++){ if(used[i])continue; const grp=[i]; used[i]=true;
    for(let qi=0; qi<grp.length; qi++){ const a=meshes[grp[qi]];
      for(let j=0;j<meshes.length;j++){ if(used[j])continue;
        if(Math.hypot(a.center.x-meshes[j].center.x, a.center.z-meshes[j].center.z) < R){ used[j]=true; grp.push(j); } } }
    clusters.push(grp.map(k=>meshes[k])); }
  // build normalized groups, classify & filter
  const groups=[];
  for(const cl of clusters){
    if(cl.length===0) continue;
    const hasGreen = cl.some(m=>isFoliage(m.col));
    const greyOnly = cl.every(m=>isGrey(m.col));
    const g=new THREE.Group();
    for(const m of cl){ const mesh=new THREE.Mesh(m.o.geometry, m.o.material); mesh.applyMatrix4(m.o.matrixWorld);
      mesh.castShadow=true; mesh.receiveShadow=true; g.add(mesh); }
    const box=new THREE.Box3().setFromObject(g); const cx=(box.min.x+box.max.x)/2, cz=(box.min.z+box.max.z)/2, minY=box.min.y;
    const sz=new THREE.Vector3(); box.getSize(sz); const maxXZ=Math.max(sz.x,sz.z);
    const bright=cl.reduce((a,m)=>a+(m.col.r+m.col.g+m.col.b)/3,0)/cl.length;
    // keep palms/grass (green) and medium-grey rocks; drop plane, big boulders, near-black rocks
    let keep=false, type='';
    if (hasGreen && maxXZ < 11 && sz.y > 0.6) { keep=true; type = sz.y>3.5 ? 'palm':'grass'; }
    else if (greyOnly && maxXZ < 4.5 && sz.y > 0.5 && bright > 0.14) { keep=true; type='rock'; }
    if (!keep) continue;
    g.children.forEach(ch=>{ ch.position.x-=cx; ch.position.y-=minY; ch.position.z-=cz; });
    g.userData = { h: sz.y, type };
    groups.push(g);
  }
  const cnt={}; groups.forEach(g=>cnt[g.userData.type]=(cnt[g.userData.type]||0)+1);
  console.log('prop prototypes:', JSON.stringify(cnt));
  return groups;
}

const _ray=new THREE.Raycaster(), _down=new THREE.Vector3(0,-1,0);
function scatterProps(groups){
  if(!groups.length){ console.warn('no props'); return; }
  // weighted pool: lots of palms/grass, few rocks
  const pool=[]; groups.forEach(g=>{ const w = g.userData.type==='palm'?6 : g.userData.type==='grass'?3 : 1; for(let k=0;k<w;k++) pool.push(g); });
  const SCALE = { palm:[0.5,0.78], grass:[0.28,0.44], rock:[0.24,0.4] };
  island.geometry.computeBoundingBox();
  const bb=island.geometry.boundingBox;
  let placed=0, tries=0, target=260;
  while(placed<target && tries<target*14){
    tries++;
    const x=THREE.MathUtils.lerp(bb.min.x,bb.max.x,Math.random());
    const z=THREE.MathUtils.lerp(bb.min.z,bb.max.z,Math.random());
    _ray.set(new THREE.Vector3(x,600,z), _down);
    const hit=_ray.intersectObject(island,true)[0];
    if(!hit || hit.point.y < seaLevel+0.3) continue;
    const proto = pool[(Math.random()*pool.length)|0];
    const g = proto.clone();
    const r = SCALE[proto.userData.type] || [0.3,0.45];
    g.scale.setScalar(r[0] + Math.random()*(r[1]-r[0]));
    g.rotation.y = Math.random()*6.28;
    g.position.set(hit.point.x, hit.point.y-0.05, hit.point.z);
    scene.add(g); placed++;
  }
  console.log('placed props:', placed, 'from', groups.length, 'prototypes');
}

let frames=0,last=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  for(const c of clouds){ c.position.x+=c.userData.spd*dt; if(c.position.x>140)c.position.x=-140; }
  controls.update();
  renderer.render(scene,camera);
  frames++; const now=performance.now(); if(now-last>500){ document.getElementById('fps').textContent=Math.round(frames*1000/(now-last))+' fps'; frames=0; last=now; }
}
</script>
</body>
</html>
