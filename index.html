<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>독도 · 리모델 3안</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; font-family:'Pretendard',sans-serif; background:#000; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  .hero { position:fixed; top:6%; left:50%; transform:translateX(-50%); z-index:10; text-align:center; pointer-events:none; width:94%; }
  .hero .en { font-weight:800; font-size:clamp(22px,4.6vw,52px); letter-spacing:0.5px; color:#fff;
    text-shadow:0 2px 18px rgba(0,0,0,.45), 0 0 30px rgba(255,210,140,.35); }
  .hero .ko { margin-top:6px; font-weight:600; font-size:clamp(13px,2vw,22px); color:rgba(255,255,255,.92);
    text-shadow:0 2px 10px rgba(0,0,0,.5); }

  .switch { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:10;
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:96vw; }
  .switch button { border:none; cursor:pointer; font-family:inherit; font-weight:700; font-size:15px; color:#1e2a32;
    padding:13px 20px; border-radius:999px; background:rgba(255,255,255,.78); backdrop-filter:blur(12px);
    box-shadow:0 4px 18px rgba(0,0,0,.22); transition:transform .12s; }
  .switch button:active { transform:scale(.93); }
  .switch button.on { background:#1e2a32; color:#fff; }

  .meta { position:fixed; top:14px; left:14px; z-index:10; color:#fff; font-size:12px; font-weight:600;
    background:rgba(0,0,0,.32); backdrop-filter:blur(8px); padding:7px 13px; border-radius:999px; }
  .fps { position:fixed; left:14px; bottom:24px; z-index:10; color:#fff; opacity:.5; font-size:11px; font-variant-numeric:tabular-nums; }
  .loader { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column;
    gap:14px; background:#11151c; z-index:50; color:#fff; font-weight:600; transition:opacity .6s; }
  .spin { width:34px; height:34px; border:3px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; animation:s .9s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="app"></div>
<div class="hero"><div class="en">DOKDO IS KOREAN TERRITORY</div><div class="ko">독도는 대한민국 영토입니다</div></div>
<div class="meta" id="meta">⛏️ 마인크래프트</div>
<div class="switch">
  <button data-s="minecraft" class="on">⛏️ 마인크래프트</button>
  <button data-s="lego">🧱 레고</button>
  <button data-s="neon">✨ 네온 홀로그램</button>
</div>
<div class="fps" id="fps"></div>
<div class="loader" id="loader"><div class="spin"></div><div>독도를 짓는 중…</div></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { mergeVertices } from 'three/addons/utils/BufferGeometryUtils.js';
import { SimplifyModifier } from 'three/addons/modifiers/SimplifyModifier.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

let renderer, scene, camera, controls, composer, bloom, envTex;
let dirLight, hemiLight, ambient;
const clock = new THREE.Clock();
const styleGroup = new THREE.Group();
let islandGeoSmooth, islandGeoLow, seaLevel = 0, hm = null;
let current = 'minecraft';

init();

function init() {
  const app = document.getElementById('app');
  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  app.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x9ed8f0);
  scene.fog = new THREE.Fog(0x9ed8f0, 120, 420);
  scene.add(styleGroup);

  const pmrem = new THREE.PMREMGenerator(renderer);
  envTex = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

  camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 1500);
  camera.position.set(0, 44, 60);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  controls.minDistance = 14; controls.maxDistance = 160;
  controls.maxPolarAngle = Math.PI/2.15;

  dirLight = new THREE.DirectionalLight(0xfff2dc, 1.5); dirLight.position.set(40,80,30);
  dirLight.castShadow = true; dirLight.shadow.mapSize.set(2048,2048);
  const sc = dirLight.shadow.camera; sc.near=1; sc.far=260; sc.left=-50; sc.right=50; sc.top=50; sc.bottom=-50;
  dirLight.shadow.bias = -0.0006; dirLight.shadow.normalBias = 0.5;
  scene.add(dirLight);
  hemiLight = new THREE.HemisphereLight(0xcfeafe, 0x778, 0.6); scene.add(hemiLight);
  ambient = new THREE.AmbientLight(0xffffff, 0.25); scene.add(ambient);

  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.3, 0.6, 0.85);
  composer.addPass(bloom);
  composer.addPass(new OutputPass());

  document.querySelectorAll('.switch button').forEach(b =>
    b.addEventListener('click', () => applyStyle(b.dataset.s)));
  addEventListener('resize', onResize);

  loadIsland();
}

function loadIsland() {
  new STLLoader().load('Dokdo_Korea.stl', (raw) => {
    raw.rotateX(-Math.PI/2); raw.center();
    raw.computeBoundingBox(); const sz = new THREE.Vector3(); raw.boundingBox.getSize(sz);
    const s = 60 / Math.max(sz.x, sz.y, sz.z); raw.scale(s,s,s);
    let merged; try { merged = mergeVertices(raw, 1e-3); } catch(e){ merged = raw; }
    merged.computeBoundingBox();
    const gMinY = merged.boundingBox.min.y, gMaxY = merged.boundingBox.max.y;
    const seaY = gMinY + (gMaxY-gMinY)*0.16;
    const lift = -gMinY*0.5;
    seaLevel = lift + seaY;
    islandGeoSmooth = merged.clone(); islandGeoSmooth.translate(0, lift, 0); islandGeoSmooth.computeVertexNormals();
    // simplified copy for neon wireframe
    try { islandGeoLow = new SimplifyModifier().modify(merged, Math.floor(merged.attributes.position.count*0.9)); islandGeoLow.translate(0,lift,0); islandGeoLow.computeVertexNormals(); }
    catch(e){ islandGeoLow = islandGeoSmooth; }
    // heightmap (raycast) — shared by minecraft + lego
    hm = computeHeightmap(islandGeoSmooth, 84);
    document.getElementById('loader').style.opacity = '0'; setTimeout(()=>document.getElementById('loader').remove(), 600);
    applyStyle('minecraft');
    animate();
  }, undefined, (err)=>{ document.getElementById('loader').innerHTML = 'STL 로드 실패<br>'+err; });
}

function computeHeightmap(geo, N) {
  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial());
  const box = new THREE.Box3().setFromObject(mesh);
  const minX=box.min.x, maxX=box.max.x, minZ=box.min.z, maxZ=box.max.z;
  const stepX=(maxX-minX)/N, stepZ=(maxZ-minZ)/N, v=Math.min(stepX,stepZ);
  const ray = new THREE.Raycaster(); const down=new THREE.Vector3(0,-1,0); const cells=[];
  let maxY=-Infinity;
  for (let i=0;i<N;i++) for (let j=0;j<N;j++){
    const x=minX+(i+0.5)*stepX, z=minZ+(j+0.5)*stepZ;
    ray.set(new THREE.Vector3(x,600,z), down);
    const hit = ray.intersectObject(mesh, true)[0];
    if (hit && hit.point.y > seaLevel + 0.2){ cells.push({x,z,y:hit.point.y}); if(hit.point.y>maxY)maxY=hit.point.y; }
  }
  return { cells, v, minHeightY: seaLevel, maxY };
}

function clearStyle() {
  while (styleGroup.children.length) {
    const o = styleGroup.children.pop();
    o.traverse?.(c => { c.geometry?.dispose?.(); if (c.material){ (Array.isArray(c.material)?c.material:[c.material]).forEach(m=>m.dispose()); } });
    styleGroup.remove(o);
  }
}

function applyStyle(name) {
  current = name;
  clearStyle();
  document.querySelectorAll('.switch button').forEach(b => b.classList.toggle('on', b.dataset.s===name));
  document.getElementById('meta').textContent = { minecraft:'⛏️ 마인크래프트', lego:'🧱 레고', neon:'✨ 네온 홀로그램' }[name];
  document.querySelector('.hero').style.color = (name==='neon') ? '#bdfcff' : '#fff';
  if (name==='minecraft') buildMinecraft();
  else if (name==='lego') buildLego();
  else buildNeon();
}

// ───────────────────────── ⛏️ MINECRAFT (voxel) ─────────────────────────
function buildMinecraft() {
  scene.background.set(0x8fd2ef); scene.fog.color.set(0x8fd2ef); scene.fog.near=140; scene.fog.far=460;
  scene.environment = null;
  dirLight.intensity=1.6; hemiLight.intensity=0.55; ambient.intensity=0.3;
  bloom.strength=0.12;

  const v = hm.v, span = hm.maxY - seaLevel || 1;
  const box = new THREE.BoxGeometry(v*1.02, v*1.02, v*1.02);
  const mat = new THREE.MeshStandardMaterial({ roughness:0.96, metalness:0, flatShading:true });
  const LAYERS = 3;
  const mesh = new THREE.InstancedMesh(box, mat, hm.cells.length*LAYERS + 1);
  mesh.castShadow = true; mesh.receiveShadow = true;
  const m4 = new THREE.Matrix4(); const col = new THREE.Color(); let n=0;
  const C = { sand:0xd9c89a, grass:0x66ab4e, grass2:0x57973f, dirt:0x9a7650, stone:0x8c8c8c, snow:0xf3f7ff };
  for (const c of hm.cells) {
    const top = Math.round(c.y / v) * v;
    const t = (c.y - seaLevel)/span;
    let color = t<0.06 ? C.sand : t<0.4 ? C.grass : t<0.55 ? C.grass2 : t<0.78 ? C.dirt : t<0.92 ? C.stone : C.snow;
    for (let k=0;k<LAYERS;k++){
      m4.makeTranslation(c.x, top - k*v, c.z); mesh.setMatrixAt(n, m4);
      col.setHex(k===0?color:C.dirt).multiplyScalar(1 - k*0.12); mesh.setColorAt(n, col); n++;
    }
  }
  mesh.count = n; mesh.instanceMatrix.needsUpdate = true; mesh.instanceColor.needsUpdate = true;
  styleGroup.add(mesh);

  // glowstone supporters
  const sup = new THREE.InstancedMesh(box, new THREE.MeshStandardMaterial({ color:0xffd24a, emissive:0xffb320, emissiveIntensity:1.1, roughness:0.5, flatShading:true }), 240);
  let sn=0; const pool = hm.cells.filter((_,i)=>i%Math.max(1,Math.floor(hm.cells.length/240))===0);
  for (const c of pool){ if(sn>=240)break; const top=Math.round(c.y/v)*v + v; m4.makeTranslation(c.x, top, c.z); sup.setMatrixAt(sn++, m4); }
  sup.count=sn; styleGroup.add(sup);

  styleGroup.add(makeWater(0x3aa0d8, 0.55, false));
}

// ───────────────────────── 🧱 LEGO ─────────────────────────
function buildLego() {
  scene.background.set(0xbfe6f2); scene.fog.color.set(0xbfe6f2); scene.fog.near=150; scene.fog.far=480;
  scene.environment = envTex;
  dirLight.intensity=1.3; hemiLight.intensity=0.7; ambient.intensity=0.35;
  bloom.strength=0.14;

  const v = hm.v, span = hm.maxY - seaLevel || 1;
  const brick = new THREE.BoxGeometry(v*1.02, v*1.02, v*1.02);
  const studG = new THREE.CylinderGeometry(v*0.28, v*0.28, v*0.22, 12); studG.translate(0, v*0.6, 0);
  const mat = new THREE.MeshStandardMaterial({ roughness:0.22, metalness:0, envMapIntensity:1.0, flatShading:false });
  const studMat = mat.clone();
  const LEGO = [0xc4151c, 0xf5c518, 0x1170b3, 0x2a8a43, 0xf2f2f2, 0xe87e04];
  const N = hm.cells.length;
  const brickM = new THREE.InstancedMesh(brick, mat, N); brickM.castShadow=true; brickM.receiveShadow=true;
  const studM = new THREE.InstancedMesh(studG, studMat, N); studM.castShadow=true;
  const m4=new THREE.Matrix4(), col=new THREE.Color(); let n=0;
  for (const c of hm.cells){
    const top = Math.round(c.y/v)*v;
    const t = (c.y-seaLevel)/span;
    const color = LEGO[Math.min(LEGO.length-1, Math.floor(t*LEGO.length))];
    m4.makeTranslation(c.x, top, c.z);
    brickM.setMatrixAt(n,m4); studM.setMatrixAt(n,m4);
    col.setHex(color); brickM.setColorAt(n,col); studM.setColorAt(n,col); n++;
  }
  brickM.count=studM.count=n; brickM.instanceColor.needsUpdate=studM.instanceColor.needsUpdate=true;
  styleGroup.add(brickM); styleGroup.add(studM);

  styleGroup.add(makeWater(0x1170b3, 1.0, true));   // glossy blue lego baseplate
}

// ───────────────────────── ✨ NEON HOLOGRAM ─────────────────────────
function buildNeon() {
  scene.background.set(0x05080f); scene.fog.color.set(0x05080f); scene.fog.near=90; scene.fog.far=380;
  scene.environment = null;
  dirLight.intensity=0.15; hemiLight.intensity=0.1; ambient.intensity=0.15;
  bloom.strength=0.9; bloom.threshold=0.0; bloom.radius=0.8;

  // translucent dark surface
  const surf = new THREE.Mesh(islandGeoLow, new THREE.MeshBasicMaterial({ color:0x0a3550, transparent:true, opacity:0.35 }));
  styleGroup.add(surf);
  // glowing wireframe
  const wire = new THREE.LineSegments(new THREE.WireframeGeometry(islandGeoLow), new THREE.LineBasicMaterial({ color:0x29e6ff, transparent:true, opacity:0.9 }));
  styleGroup.add(wire);

  // neon supporter nodes on the surface
  const pts = []; const above = islandGeoSmooth.attributes.position;
  for (let i=0;i<above.count;i+=Math.max(1,Math.floor(above.count/600))){
    if (above.getY(i) > seaLevel+0.3) pts.push(above.getX(i), above.getY(i)+0.4, above.getZ(i));
  }
  const pg = new THREE.BufferGeometry(); pg.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
  const node = new THREE.Points(pg, new THREE.PointsMaterial({ color:0xff4df5, size:0.9, sizeAttenuation:true, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false }));
  node.userData.pulse = true; styleGroup.add(node);

  // holographic grid sea
  const grid = new THREE.GridHelper(600, 120, 0x18a0c8, 0x0e5a78);
  grid.position.y = seaLevel; grid.material.transparent=true; grid.material.opacity=0.5;
  styleGroup.add(grid);
}

function makeWater(color, opacity, glossy) {
  const g = new THREE.PlaneGeometry(900, 900); g.rotateX(-Math.PI/2);
  const m = new THREE.MeshStandardMaterial({ color, roughness: glossy?0.2:0.6, metalness:0, envMapIntensity: glossy?1:0.2, transparent: opacity<1, opacity });
  const mesh = new THREE.Mesh(g, m); mesh.position.y = seaLevel - 0.2; mesh.receiveShadow = true; return mesh;
}

function onResize() {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
}

let frames=0, last=performance.now();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();
  if (current==='neon') {
    styleGroup.children.forEach(o => { if (o.userData.pulse) o.material.size = 0.7 + Math.sin(t*2.5)*0.25; });
  }
  composer.render();
  frames++; const now=performance.now();
  if (now-last>500){ document.getElementById('fps').textContent = Math.round(frames*1000/(now-last))+' fps'; frames=0; last=now; }
}
</script>
</body>
</html>
