<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>독도 · 클레이 프로토타입</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
  :root { --ink:#1e2a32; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .topwrap { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; width: 92%; }
  .title { display:inline-block; color: var(--ink); font-weight: 700; font-size: 15px; letter-spacing: -0.2px;
    background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 999px;
    box-shadow: 0 2px 14px rgba(40,60,80,0.10); }
  .counter { margin-top: 8px; color: var(--ink); font-weight: 700; font-size: 13px; opacity:.85;
    background: rgba(255,255,255,0.5); backdrop-filter: blur(8px); padding: 5px 13px; border-radius: 999px; display:inline-block; }
  .hint { margin-top: 7px; color: var(--ink); opacity: .6; font-size: 12px; font-weight: 500; transition: opacity .4s; }

  .dock { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 10; flex-wrap: wrap; justify-content: center; max-width: 94vw; }
  .pill { border: none; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 14px; color: var(--ink);
    padding: 11px 16px; border-radius: 999px; background: rgba(255,255,255,0.72); backdrop-filter: blur(12px);
    box-shadow: 0 3px 16px rgba(40,60,80,0.12); transition: transform .12s, background .2s; white-space: nowrap; }
  .pill:active { transform: scale(0.94); }
  .pill.on { background: var(--ink); color: #fff; }

  .loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column;
    gap: 14px; background: #cfe8f2; z-index: 50; color: var(--ink); font-weight: 600; transition: opacity .6s; font-size: 14px; }
  .spinner { width: 34px; height: 34px; border: 3px solid rgba(30,42,50,.18); border-top-color: var(--ink);
    border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fps { position: fixed; left: 12px; bottom: 22px; z-index: 10; font-size: 11px; color: var(--ink); opacity: .45; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="app"></div>
<div class="topwrap">
  <div class="title">독도 · 클레이 프로토타입</div>
  <div class="counter" id="counter">🔥 0명이 독도를 밝혔습니다</div>
  <div class="hint" id="hint">독도를 탭하면 그 자리에 당신의 불빛이 켜집니다 ✨</div>
</div>

<div class="dock">
  <button class="pill on" data-w="clear">☀️ 맑음</button>
  <button class="pill" data-w="rain">🌧️ 비</button>
  <button class="pill" data-w="snow">❄️ 눈</button>
  <button class="pill" id="styleBtn">🧱 로우폴리</button>
  <button class="pill" id="resetBtn">↺ 전체</button>
</div>
<div class="fps" id="fps"></div>

<div class="loader" id="loader"><div class="spinner"></div><div>독도를 빚는 중…</div></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { SimplifyModifier } from 'three/addons/modifiers/SimplifyModifier.js';
import { mergeVertices } from 'three/addons/utils/BufferGeometryUtils.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const SKY = { clear: 0x4d5f82, rain: 0x38424f, snow: 0x8896ad };   // dusk / blue-hour mood

let renderer, scene, camera, controls, composer;
let islandSmooth, islandLow, island;
let ocean, lightSprites, lanterns;
const clouds = [];
let raindrops, snowflakes, skyText;
let weather = 'clear', lowpoly = false;
let snowCover = 0, snowTarget = 0, snowApplied = -1;
let seaLevelWorld = 0, seaY = 0;
const clock = new THREE.Clock();

let supporterCount = 0;

// camera fly-to
let flying = false, flyT = 0; const flyDur = 1.5;
const flyFrom = new THREE.Vector3(), flyTo = new THREE.Vector3(), tgtFrom = new THREE.Vector3(), tgtTo = new THREE.Vector3();
const HOME_CAM = new THREE.Vector3(0, 42, 50), HOME_TGT = new THREE.Vector3(0, 0, 0);

const glowTex = makeGlowTexture();
const cloudTex = makeCloudTexture();

init();

function init() {
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.86;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.getElementById('app').appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(SKY.clear);
  scene.fog = new THREE.Fog(SKY.clear, 90, 340);

  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1200);
  camera.position.copy(HOME_CAM);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  controls.minDistance = 12; controls.maxDistance = 130;
  controls.maxPolarAngle = Math.PI / 2.5;   // keep a diorama angle — never fully horizontal (water grazes low islands)
  controls.target.copy(HOME_TGT);

  const key = new THREE.DirectionalLight(0xffd2a6, 0.95); key.position.set(30, 60, 20); scene.add(key);
  scene.add(new THREE.HemisphereLight(0x5a6e92, 0x2a3340, 0.5));

  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  // subtle bloom — small light dots twinkle, scene not blown out
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.75, 0.72));
  composer.addPass(new OutputPass());

  addSkyText();
  addClouds();

  loadIsland();

  renderer.domElement.addEventListener('pointerdown', onDown);
  window.addEventListener('resize', onResize);
  document.querySelectorAll('[data-w]').forEach(b => b.addEventListener('click', () => setWeather(b.dataset.w)));
  document.getElementById('styleBtn').addEventListener('click', toggleStyle);
  document.getElementById('resetBtn').addEventListener('click', flyHome);
}

// ---------- textures ----------
function makeGlowTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const g = c.getContext('2d'); const grd = g.createRadialGradient(32,32,0,32,32,32);
  grd.addColorStop(0, 'rgba(255,244,214,1)'); grd.addColorStop(0.35, 'rgba(255,214,150,0.85)');
  grd.addColorStop(1, 'rgba(255,200,120,0)'); g.fillStyle = grd; g.fillRect(0,0,64,64);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}
function makeCloudTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  for (let i=0;i<7;i++){ const x=30+Math.random()*68, y=40+Math.random()*48, r=20+Math.random()*26;
    const grd=g.createRadialGradient(x,y,0,x,y,r); grd.addColorStop(0,'rgba(255,255,255,0.95)'); grd.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=grd; g.beginPath(); g.arc(x,y,r,0,7); g.fill(); }
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}

// ---------- sky banner ----------
function addSkyText() {
  const W = 2600, H = 680;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  g.clearRect(0,0,W,H);
  g.textAlign = 'center'; g.textBaseline = 'middle';

  // main line — auto-shrink to always fit the canvas (was clipping before)
  const main = 'DOKDO IS KOREAN TERRITORY';
  let fs = 150; g.font = `800 ${fs}px Pretendard, sans-serif`;
  while (g.measureText(main).width > W - 200 && fs > 40) { fs -= 4; g.font = `800 ${fs}px Pretendard, sans-serif`; }
  g.fillStyle = 'rgba(255,255,255,0.98)';
  g.shadowColor = 'rgba(255,190,110,0.55)'; g.shadowBlur = 34; g.shadowOffsetY = 0;
  g.fillText(main, W/2, H*0.40);

  g.shadowBlur = 16;
  g.font = '600 84px Pretendard, sans-serif'; g.fillStyle = 'rgba(255,255,255,0.9)';
  g.fillText('독도는 대한민국 영토입니다', W/2, H*0.74);

  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; tex.anisotropy = 4;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, fog: false });
  skyText = new THREE.Sprite(mat);
  skyText.scale.set(44, 44 * H/W, 1);     // keep canvas aspect (no squish)
  skyText.position.set(0, 21, -6);        // hero banner in the sky, fully inside the default frame
  scene.add(skyText);
}

// ---------- clouds ----------
function addClouds() {
  for (let i=0;i<11;i++){
    const m = new THREE.SpriteMaterial({ map: cloudTex, transparent: true, opacity: 0.45, depthWrite: false, fog: false });
    const s = new THREE.Sprite(m);
    const sc = 22 + Math.random()*26; s.scale.set(sc, sc*0.6, 1);
    s.position.set((Math.random()-0.5)*220, 24 + Math.random()*22, (Math.random()-0.5)*160);
    s.userData.spd = 0.6 + Math.random()*1.1;
    scene.add(s); clouds.push(s);
  }
}

// ---------- palette ----------
function paletteColor(t) {
  const bands = [[0.00,0x53b189],[0.30,0x46a06f],[0.54,0x6f9a4c],[0.76,0x97894e],[0.92,0xb29a66]];
  let c = bands[0][1]; for (const [e,col] of bands) if (t>=e) c=col; return new THREE.Color(c);
}
function colorIsland(geo, seaYLocal) {
  const pos = geo.attributes.position; let minY=Infinity, maxY=-Infinity;
  for (let i=0;i<pos.count;i++){ const y=pos.getY(i); if(y<minY)minY=y; if(y>maxY)maxY=y; }
  const sand = new THREE.Color(0xe0cb9e), deep = new THREE.Color(0x6f7d6c);
  const cols = new Float32Array(pos.count*3);
  for (let i=0;i<pos.count;i++){
    const y=pos.getY(i); let c;
    if (y<seaYLocal){ const d=(seaYLocal-y)/((seaYLocal-minY)||1); c=sand.clone().lerp(deep, Math.min(1,d)); }
    else { const t=(y-seaYLocal)/((maxY-seaYLocal)||1); c=paletteColor(t); }
    cols[i*3]=c.r; cols[i*3+1]=c.g; cols[i*3+2]=c.b;
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(cols,3));
  // snow mask: only above-water, upward-facing verts collect snow
  geo.computeVertexNormals();
  const nrm = geo.attributes.normal; const mask = new Float32Array(pos.count);
  for (let i=0;i<pos.count;i++){ const up=Math.max(0,nrm.getY(i)); mask[i] = (pos.getY(i)>seaYLocal) ? Math.pow(up,0.7) : 0; }
  geo.userData.baseColor = cols.slice(0);
  geo.userData.snowMask = mask;
}
function applySnow(geo, cover) {
  const base = geo.userData.baseColor, mask = geo.userData.snowMask; if (!base) return;
  const col = geo.attributes.color; const sw = new THREE.Color(0xf2f6ff); const c = new THREE.Color();
  for (let i=0;i<mask.length;i++){
    const k = Math.min(1, cover*mask[i]*1.3);
    c.setRGB(base[i*3],base[i*3+1],base[i*3+2]).lerp(sw, k);
    col.setXYZ(i, c.r, c.g, c.b);
  }
  col.needsUpdate = true;
}

// ---------- island ----------
function loadIsland() {
  new STLLoader().load('Dokdo_Korea.stl', (raw) => {
    raw.rotateX(-Math.PI/2); raw.center();
    raw.computeBoundingBox(); const size = new THREE.Vector3(); raw.boundingBox.getSize(size);
    const s = 54 / Math.max(size.x, size.y, size.z); raw.scale(s,s,s);

    let merged; try { merged = mergeVertices(raw, 1e-3); } catch(e){ merged = raw; }
    merged.computeBoundingBox();
    const gMinY = merged.boundingBox.min.y, gMaxY = merged.boundingBox.max.y;
    seaY = gMinY + (gMaxY - gMinY) * 0.16;

    const smoothGeo = merged.clone(); colorIsland(smoothGeo, seaY);
    let lowGeo = null;
    try {
      const target = Math.floor(merged.attributes.position.count * 0.86);
      lowGeo = new SimplifyModifier().modify(merged, target).toNonIndexed();
      colorIsland(lowGeo, seaY);
    } catch(e){ console.warn('simplify failed', e); }

    const matS = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.92, metalness:0, flatShading:false, envMapIntensity:0.28 });
    const matL = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.95, metalness:0, flatShading:true,  envMapIntensity:0.28 });
    islandSmooth = new THREE.Mesh(smoothGeo, matS); scene.add(islandSmooth);
    if (lowGeo) { islandLow = new THREE.Mesh(lowGeo, matL); islandLow.visible=false; scene.add(islandLow); }
    island = islandSmooth;

    const lift = -gMinY * 0.55;
    islandSmooth.position.y = lift; if (islandLow) islandLow.position.y = lift;
    seaLevelWorld = lift + seaY;

    buildOcean();
    seedSupporters(800, smoothGeo, lift);

    const ld = document.getElementById('loader'); ld.style.opacity='0'; setTimeout(()=>ld.remove(),600);
    animate();
  }, undefined, (err) => { document.getElementById('loader').innerHTML = '<div>STL 로드 실패 😢<br>'+err+'</div>'; });
}

// ---------- ocean: big OPAQUE sea, reaches horizon, gentle ripples (no floor plate) ----------
function buildOcean() {
  const geo = new THREE.PlaneGeometry(1200, 1200, 90, 90);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position; const cols = new Float32Array(pos.count*3);
  const cLow = new THREE.Color(0x21455e), cHigh = new THREE.Color(0x356f86);
  for (let i=0;i<pos.count;i++){ const c=cLow.clone().lerp(cHigh,0.5); cols[i*3]=c.r;cols[i*3+1]=c.g;cols[i*3+2]=c.b; }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(cols,3));
  geo.userData.base = Float32Array.from(pos.array);
  const mat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.55, metalness:0, flatShading:true, envMapIntensity:0.18 });
  ocean = new THREE.Mesh(geo, mat); ocean.position.y = seaLevelWorld; scene.add(ocean);
}
function animateOcean(t) {
  if (!ocean) return;
  const pos = ocean.geometry.attributes.position, base = ocean.geometry.userData.base;
  const cLow = new THREE.Color(0x21455e), cHigh = new THREE.Color(0x356f86), cols = ocean.geometry.attributes.color, c = new THREE.Color();
  const amp = weather==='rain' ? 0.3 : 0.16;                 // tiny ripples — big island scale
  for (let i=0;i<pos.count;i++){
    const x=base[i*3], z=base[i*3+2];
    const h = Math.sin(x*0.25 + t*1.3)*0.5 + Math.cos(z*0.3 + t*1.1)*0.5;
    pos.setY(i, h*amp);
    const k=(h+1)/2; c.copy(cLow).lerp(cHigh, k*0.85+0.07); cols.setXYZ(i,c.r,c.g,c.b);
  }
  pos.needsUpdate = true; cols.needsUpdate = true; ocean.geometry.computeVertexNormals();
}

// ---------- supporters: warm planted lights that brighten the lonely island ----------
// INTERIM: trypophobic dot-carpet removed. A few soft drifting lanterns as placeholder
// while we pick the real treatment (beams / lanterns / glow-from-within — see proposal).
function seedSupporters(n, geo, lift) {
  lanterns = new THREE.Group(); scene.add(lanterns);
  lightSprites = new THREE.Group(); scene.add(lightSprites);
  const pos = geo.attributes.position; const above = [];
  for (let i=0;i<pos.count;i++){ if (pos.getY(i) > seaY + 0.5) above.push(i); }
  for (let i=0;i<14;i++){ const idx = above.length ? above[(Math.random()*above.length)|0] : 0;
    addLantern(pos.getX(idx), pos.getY(idx)+lift, pos.getZ(idx)); }
  supporterCount = n; updateCounter();
}
function addLantern(x, baseY, z) {
  const m = new THREE.SpriteMaterial({ map: glowTex, color: 0xffb45a, transparent:true, opacity:0.55,
    depthWrite:false, blending: THREE.AdditiveBlending, fog:false });
  const s = new THREE.Sprite(m); const sc = 2.2 + Math.random()*2.6; s.scale.set(sc, sc, 1);
  s.position.set(x, baseY + 2.5 + Math.random()*4, z);
  s.userData = { x, z, baseY: baseY + 2.5, t: Math.random()*6.28, sway: 0.6 + Math.random()*0.9 };
  lanterns.add(s);
}
function animateLanterns(dt) {
  if (lanterns) for (const s of lanterns.children) { s.userData.t += dt; const ph = s.userData.t;
    s.position.y = s.userData.baseY + Math.sin(ph*0.5)*1.2;
    s.position.x = s.userData.x + Math.sin(ph*0.3)*s.userData.sway;
    s.material.opacity = 0.42 + Math.sin(ph*1.1)*0.18; }
}
function plantLight(p) {
  addLantern(p.x, p.y, p.z);
  supporterCount++; updateCounter();
}
function updateCounter() {
  document.getElementById('counter').textContent = '🔥 ' + supporterCount.toLocaleString() + '명이 독도를 밝혔습니다 · 목표 35,000';
}

// ---------- weather ----------
function setWeather(w) {
  weather = w;
  document.querySelectorAll('[data-w]').forEach(b => b.classList.toggle('on', b.dataset.w===w));
  const col = new THREE.Color(SKY[w]); scene.background = col; scene.fog.color = col;
  snowTarget = (w==='snow') ? 1 : 0;
  if (w==='rain' && !raindrops) makeRain();
  if (w==='snow' && !snowflakes) makeSnow();
  if (raindrops) raindrops.visible = (w==='rain');
  if (snowflakes) snowflakes.visible = (w==='snow');
}
function makeRain() {
  const N=3200, g=new THREE.BufferGeometry(), p=new Float32Array(N*3);
  for (let i=0;i<N;i++){ p[i*3]=(Math.random()-0.5)*140; p[i*3+1]=Math.random()*90; p[i*3+2]=(Math.random()-0.5)*140; }
  g.setAttribute('position', new THREE.BufferAttribute(p,3));
  raindrops = new THREE.Points(g, new THREE.PointsMaterial({ color:0xcfe6ff, size:0.16, transparent:true, opacity:0.55, depthWrite:false }));
  raindrops.visible = (weather==='rain'); scene.add(raindrops);
}
function makeSnow() {
  const N=1600, g=new THREE.BufferGeometry(), p=new Float32Array(N*3);
  for (let i=0;i<N;i++){ p[i*3]=(Math.random()-0.5)*140; p[i*3+1]=Math.random()*90; p[i*3+2]=(Math.random()-0.5)*140; }
  g.setAttribute('position', new THREE.BufferAttribute(p,3));
  snowflakes = new THREE.Points(g, new THREE.PointsMaterial({ color:0xffffff, size:0.5, transparent:true, opacity:0.9, depthWrite:false }));
  snowflakes.visible = (weather==='snow'); scene.add(snowflakes);
}
function fall(points, speed, drift) {
  if (!points || !points.visible) return; const a=points.geometry.attributes.position.array;
  for (let i=0;i<a.length;i+=3){ a[i+1]-=speed; if(drift)a[i]+=Math.sin(performance.now()*0.001+i)*0.02; if(a[i+1]<0)a[i+1]=90; }
  points.geometry.attributes.position.needsUpdate = true;
}

// ---------- interaction ----------
const ray = new THREE.Raycaster(), ndc = new THREE.Vector2(); let downX=0, downY=0;
function onDown(e){ downX=e.clientX; downY=e.clientY; renderer.domElement.addEventListener('pointerup', onUp, { once:true }); }
function onUp(e){
  if (Math.hypot(e.clientX-downX, e.clientY-downY) > 8) return;
  if (!island || flying) return;
  ndc.x=(e.clientX/window.innerWidth)*2-1; ndc.y=-(e.clientY/window.innerHeight)*2+1;
  ray.setFromCamera(ndc, camera); const hit = ray.intersectObject(island, true)[0]; if (!hit) return;
  plantLight(hit.point.clone());
  flyFrom.copy(camera.position); tgtFrom.copy(controls.target); tgtTo.copy(hit.point);
  const dir = new THREE.Vector3().subVectors(camera.position, hit.point).normalize();
  flyTo.copy(hit.point).add(dir.multiplyScalar(18)).add(new THREE.Vector3(0,6,0));
  flying = true; flyT = 0; document.getElementById('hint').style.opacity='0';
}
function flyHome(){ flyFrom.copy(camera.position); tgtFrom.copy(controls.target); flyTo.copy(HOME_CAM); tgtTo.copy(HOME_TGT); flying=true; flyT=0; }
const easeInOut = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;

function toggleStyle(){
  if (!islandLow){ document.getElementById('styleBtn').textContent='🧱 (생성 실패)'; return; }
  lowpoly = !lowpoly; islandSmooth.visible=!lowpoly; islandLow.visible=lowpoly; island = lowpoly?islandLow:islandSmooth;
  snowApplied = -1; // re-apply snow to newly visible mesh
  document.getElementById('styleBtn').textContent = lowpoly ? '🟢 스무스' : '🧱 로우폴리';
  document.getElementById('styleBtn').classList.toggle('on', lowpoly);
}
function onResize(){ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); }

let frames=0, lastFps=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(), t=clock.elapsedTime;

  if (flying){ flyT += dt/flyDur; const k=easeInOut(Math.min(flyT,1));
    camera.position.lerpVectors(flyFrom,flyTo,k); controls.target.lerpVectors(tgtFrom,tgtTo,k); if(flyT>=1)flying=false; }
  controls.update();

  animateOcean(t);
  fall(raindrops, 0.9, false); fall(snowflakes, 0.3, true);

  // clouds drift
  for (const c of clouds){ c.position.x += c.userData.spd*dt; if (c.position.x>130) c.position.x=-130; }

  // snow accumulation easing
  snowCover += (snowTarget - snowCover) * Math.min(1, dt*0.6);
  if (island && Math.abs(snowCover - snowApplied) > 0.01){ applySnow(island.geometry, snowCover); snowApplied = snowCover; }

  animateLanterns(dt);

  composer.render();

  frames++; const now=performance.now();
  if (now-lastFps>500){ const f=Math.round(frames*1000/(now-lastFps)); frames=0; lastFps=now;
    document.getElementById('fps').textContent = f+' fps · '+supporterCount.toLocaleString()+' lights'; }
}
</script>
</body>
